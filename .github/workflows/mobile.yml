name: Mobile Skeleton Check

on:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

jobs:
  mobile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate mobile key files
        run: |
          test -f mobile/package.json
          test -f mobile/App.tsx
          test -d mobile/src/modules

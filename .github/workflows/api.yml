name: API Skeleton Check

on:
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'

jobs:
  api-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate API key files
        run: |
          test -f api/package.json
          test -f api/src/app/server.js
          test -d api/src/app/modules
